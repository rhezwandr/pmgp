services:
  postgres:
    image: postgres:16
    container_name: kam_lkm_postgres
    environment:
      POSTGRES_DB: kam_lkm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - kam_lkm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kam_lkm_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kam_lkm_postgres_data:
